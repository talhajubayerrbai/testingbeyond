name: Deploy

on:
  workflow_dispatch:

jobs:
  #  Test 
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install fastapi uvicorn gunicorn
          fi
          pip install pytest httpx || true

      - name: Run tests
        run: |
          if [ -d tests ] && [ "$(find tests -name '*.py' | head -1)" != "" ]; then
            pytest tests/ -v
          else
            echo "No tests found - skipping."
          fi

  #  Build / Provision 
  build:
    name: Build & Provision Infrastructure
    runs-on: ubuntu-latest
    needs: test
    outputs:
      server_ip: ${{ steps.tf_output.outputs.server_ip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "server_ip=${SERVER_IP}" >> "$GITHUB_OUTPUT"

  #  Deploy 
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Prepare SSH private key
        run: |
          PRIVATE_KEY_FILE=$(mktemp)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > "${PRIVATE_KEY_FILE}"
          chmod 600 "${PRIVATE_KEY_FILE}"
          echo "PRIVATE_KEY_FILE=${PRIVATE_KEY_FILE}" >> "$GITHUB_ENV"

      - name: Wait for SSH to be available
        run: |
          SERVER_IP="${{ needs.build.outputs.server_ip }}"
          echo "Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -i "${PRIVATE_KEY_FILE}" \
                   "ubuntu@${SERVER_IP}" "echo ready" 2>/dev/null; then
              echo "SSH is up."
              break
            fi
            echo "Attempt ${i}/30 - sleeping 10s..."
            sleep 10
          done

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ needs.build.outputs.server_ip }}"
          ansible-playbook ansible/playbook.yml \
            -i "${SERVER_IP}," \
            --private-key "${PRIVATE_KEY_FILE}" \
            -u ubuntu \
            -e "app_dir=/opt/app"

      - name: Clean up SSH key
        if: always()
        run: |
          if [ -n "${PRIVATE_KEY_FILE}" ] && [ -f "${PRIVATE_KEY_FILE}" ]; then
            rm -f "${PRIVATE_KEY_FILE}"
          fi

      - name: Health check - verify app is responding
        run: |
          SERVER_IP="${{ needs.build.outputs.server_ip }}"
          echo "Running health check against http://${SERVER_IP}/health ..."
          for i in $(seq 1 12); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "http://${SERVER_IP}/health" || echo "000")
            echo "Attempt ${i}/12 - HTTP status: ${HTTP_STATUS}"
            if echo "${HTTP_STATUS}" | grep -qE '^[23][0-9]{2}$'; then
              echo "Health check passed with status ${HTTP_STATUS}."
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Health check failed - app did not return 2xx/3xx after all retries."
          exit 1

  #  Destroy (manual, optional) 
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.destroy == 'true' }}
    environment: destroy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Destroy
        working-directory: terraform
        run: |-
          terraform destroy -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"
