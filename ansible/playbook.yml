---
- name: Configure server and deploy application
  hosts: all
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/app
    app_user: ubuntu
    python_bin: /usr/bin/python3.11
    venv_dir: /opt/app/.venv
    gunicorn_bin: /opt/app/.venv/bin/gunicorn
    service_name: app

  tasks:

    #  System packages 

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3.11-dev
          - python3-pip
          - nginx
          - rsync
          - git
          - curl
        state: present

    #  Application directory 

    - name: Create /opt/app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    #  Sync application files 

    - name: Sync application files to /opt/app
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}/"
        delete: false
        recursive: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.github"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=.venv"
          - "--exclude=terraform"
          - "--exclude=ansible"
          - "--exclude=node_modules"

    - name: Fix ownership of app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    #  Python virtual environment 

    - name: Create Python 3.11 virtual environment
      command: "{{ python_bin }} -m venv {{ venv_dir }}"
      args:
        creates: "{{ venv_dir }}/bin/activate"
      become_user: "{{ app_user }}"

    - name: Upgrade pip inside venv
      command: "{{ venv_dir }}/bin/pip install --upgrade pip"
      become_user: "{{ app_user }}"

    - name: Install Python dependencies from requirements.txt
      command: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      become_user: "{{ app_user }}"
      when: requirements_file.stat.exists
      vars:
        requirements_file: "{{ lookup('vars', 'req_stat', default={'stat': {'exists': false}}) }}"

    - name: Check if requirements.txt exists
      stat:
        path: "{{ app_dir }}/requirements.txt"
      register: req_stat

    - name: Install Python dependencies from requirements.txt (if present)
      command: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      become_user: "{{ app_user }}"
      when: req_stat.stat.exists

    - name: Install fallback dependencies if no requirements.txt
      command: "{{ venv_dir }}/bin/pip install fastapi uvicorn[standard] gunicorn"
      become_user: "{{ app_user }}"
      when: not req_stat.stat.exists

    - name: Ensure gunicorn and uvicorn worker are installed
      command: "{{ venv_dir }}/bin/pip install gunicorn uvicorn[standard]"
      become_user: "{{ app_user }}"

    #  Systemd service 

    - name: Create systemd service file for the app
      copy:
        dest: /etc/systemd/system/{{ service_name }}.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=FastAPI Application (gunicorn + uvicorn)
          After=network.target

          [Service]
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          Environment="PATH={{ venv_dir }}/bin"
          ExecStart={{ gunicorn_bin }} app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start the app service
      systemd:
        name: "{{ service_name }}"
        enabled: true
        state: restarted

    #  Nginx configuration 

    - name: Write nginx site configuration
      shell: |
        cat > /etc/nginx/sites-available/app << 'NGINXEOF'
        server {
            listen 80 default_server;
            listen [::]:80 default_server;

            server_name _;

            location / {
                proxy_pass         http://127.0.0.1:8000;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_read_timeout 60s;
                proxy_connect_timeout 10s;
            }
        }
        NGINXEOF

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test nginx configuration
      command: nginx -t
      changed_when: false

    - name: Enable and restart nginx
      systemd:
        name: nginx
        enabled: true
        state: restarted

    #  Verify application is listening locally 

    - name: Wait for gunicorn to bind on port 8000
      wait_for:
        host: 127.0.0.1
        port: 8000
        timeout: 60
        state: started

    - name: Verify health endpoint responds locally
      uri:
        url: http://127.0.0.1:8000/health
        method: GET
        status_code: 200
        timeout: 15
      register: health_result
      retries: 6
      delay: 5
      until: health_result.status == 200